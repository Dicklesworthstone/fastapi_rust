name: Security Audit

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  push:
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '**/Cargo.toml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        # Ignored advisories all originate from `syntect`, an OPTIONAL transitive
        # dependency pulled in ONLY via `rich_rust/full` (fastapi's opt-in `full`
        # feature). It is NOT compiled in default builds. Even when enabled,
        # syntect uses these crates solely to parse its own bundled theme/syntax
        # definition files (trusted, ship-with-syntect data) — never HTTP request
        # bodies or any attacker-controlled input — so the XML-parsing DoS
        # advisories below are not reachable/exploitable here. There is no upstream
        # fix path: plist 1.9.0 (latest) pins quick-xml ^0.39.2, so quick-xml
        # cannot be bumped to the patched >=0.41.0 without a new syntect/plist
        # release. Re-audit and drop these ignores once syntect updates.
        #   RUSTSEC-2026-0194 / 0195: quick-xml DoS (via syntect -> plist)
        #   RUSTSEC-2025-0141:        bincode unmaintained (via syntect)
        #   RUSTSEC-2024-0320:        yaml-rust unmaintained (via syntect)
        run: >-
          cargo audit
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195
          --ignore RUSTSEC-2025-0141
          --ignore RUSTSEC-2024-0320

      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            const title = 'Security audit found vulnerabilities';
            const body = `The scheduled security audit has found vulnerabilities in dependencies.

            Please review the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.

            Run \`cargo audit\` locally to see the full report and take appropriate action.`;

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
              per_page: 100
            });

            const existingIssue = issues.data.find(i => i.title === title);
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'dependencies']
              });
            }

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories
        continue-on-error: true
